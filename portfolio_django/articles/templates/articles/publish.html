{% extends 'base.html' %}
{% load i18n %}

{% block title %}Publish | Portfolio{% endblock %}

{% block page_title %}Articles{% endblock %}
{% block page_subtitle %}Module 07{% endblock %}

{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
  <div class="card-header bg-primary text-white">
    <h1 class="h4 mb-0">{% trans "Publish Article" %}</h1>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">{% trans "Publish" %}</button>
    </form>
  </div>
</div>
{% endblock %}
