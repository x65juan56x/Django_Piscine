<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Ex02: First Form</title>
</head>
<body>
    <h1>Submit your text</h1>

    <form method="post" action="">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Submit</button>
    </form>

    <h2>History</h2>
    <ul>
        {% for entry in history %}
            <li>{{ entry }}</li>
        {% empty %}
            <li>No history yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
