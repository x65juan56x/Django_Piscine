<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars Movies</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Star Wars Movies (SQL)</h1>

    <table>
        <tr>
            <th>Episode</th>
            <th>Title</th>
            <th>Opening Crawl</th>
            <th>Director</th>
            <th>Producer</th>
            <th>Release Date</th>
            <th>Created</th>
            <th>Updated</th>
        </tr>

        {% for movie in movies %}
        <tr>
            <td>{{ movie.0 }}</td>
            <td>{{ movie.1 }}</td>
            <td>{{ movie.2 }}</td>
            <td>{{ movie.3 }}</td>
            <td>{{ movie.4 }}</td>
            <td>{{ movie.5 }}</td>
            <td>{{ movie.6 }}</td>
            <td>{{ movie.7 }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
