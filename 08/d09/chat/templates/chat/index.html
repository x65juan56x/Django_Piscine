<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Chat Rooms</title>
</head>
<body>
    <h1>Chat Rooms</h1>
    <ul>
        {% for room in rooms %}
        <li><a href="{% url 'chat:room' room.name %}">{{ room.name }}</a></li>
        {% empty %}
        <li>No rooms available.</li>
        {% endfor %}
    </ul>
</body>
</html>
