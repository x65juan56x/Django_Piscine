{% extends 'ex/base.html' %}
{% load django_bootstrap5 %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Log In</h2>
            <form method="POST" action="">
                {% csrf_token %}
                {% bootstrap_form form %}
                <button type="submit" class="btn btn-success w-100 mt-3">Log In</button>
            </form>
        </div>
    </div>
{% endblock %}
